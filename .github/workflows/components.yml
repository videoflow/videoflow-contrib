name: components

# Validate every component descriptor against the videoflow component schema, and
# check each sub-package builds a wheel from its pyproject.toml (catches a broken
# package definition before an image build would fail on `uv pip install .`).
on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate-descriptors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install videoflow with the deploy extra (component CLI + jsonschema)
        run: pip install "videoflow[deploy] @ git+https://github.com/videoflow/videoflow" jsonschema
      - name: Validate component descriptors
        run: ./validate-components.sh

  check-packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Every sub-package builds a wheel from its pyproject.toml
        run: |
          set -euo pipefail
          for d in */pyproject.toml; do
            dir="$(dirname "$d")"
            echo "== $dir =="
            ( cd "$dir" && uv build --wheel )
          done
