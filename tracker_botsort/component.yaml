apiVersion: videoflow.io/v1
kind: Component
metadata:
  name: videoflow/tracker-botsort
  version: "0.1"
  license: AGPL-3.0
  description: Appearance-aware multi-object tracker (BoxMOT). BoT-SORT-ReID by default (motion + ReID + camera-motion compensation); OC-SORT/DeepOCSORT/BoostTrack/ByteTrack/HybridSORT selectable. Consumes frame + detections, preserves y-first boxes with track ids.
spec:
  role: processor
  protocol: 1
  runtime:
    pythonClass: videoflow_contrib.tracker_botsort.BoxmotTracker
    images:
      cpu: ghcr.io/videoflow/contrib-tracker-botsort:0.1
      gpu: ghcr.io/videoflow/contrib-tracker-botsort:0.1-cuda
  device: [cpu, gpu]
  params:
    schema:
      type: object
      additionalProperties: false
      properties:
        method: {type: string, default: botsort, enum: [botsort, ocsort, deepocsort, boosttrack, bytetrack, hybridsort]}
        reid_weights: {type: ["string", "null"], default: null, description: ReID model path or BoxMOT zoo name.}
        half: {type: boolean, default: true}
        min_conf: {type: number, default: 0.3, minimum: 0, maximum: 1}
        per_class: {type: boolean, default: false}
  io:
    inputs:
      - {name: frame, type: videoflow.v1.Tensor}
      - {name: detections, type: videoflow.v1.Tensor}
    output: {type: videoflow.v1.Tensor}   # (M, 5): [ymin, xmin, ymax, xmax, track_id]
  # Stateful across frames (Kalman + ReID gallery): OneTaskProcessorNode.
  constraints: {singleton: true}
