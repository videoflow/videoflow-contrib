apiVersion: videoflow.io/v1
kind: Component
metadata:
  name: videoflow/tracker-sort
  version: "1.0.0"
  license: MIT
  description: SORT multi-object tracker (Kalman filter + IOU association). Stateful across frames, single task.
spec:
  role: processor
  protocol: 1
  runtime:
    pythonClass: videoflow_contrib.tracker_sort.KalmanFilterBoundingBoxTracker
    images:
      cpu: ghcr.io/videoflow/contrib-tracker-sort:1.0.0
  device: [cpu]
  params:
    schema:
      type: object
      additionalProperties: false
      properties:
        max_age: {type: integer, default: 7, minimum: 1}
        min_hits: {type: integer, default: 3, minimum: 1}
        metric_function_type: {type: string, default: iou, enum: [iou]}
        metric_function_threshold: {type: ["number", "null"], default: null}
        show_in_between: {type: boolean, default: true}
        return_original_dets: {type: boolean, default: false}
  io:
    inputs:
      - {name: detections, type: videoflow.v1.Tensor}   # (nb_boxes, 6)
    output: {type: videoflow.v1.Tensor}                 # (nb_boxes, 5): [x1, y1, x2, y2, track_id]
  # Stateful across frames for a single stream: a OneTaskProcessorNode, so it runs
  # as a single task (nb_tasks forced to 1).
  constraints: {singleton: true}
