apiVersion: videoflow.io/v1
kind: Component
metadata:
  name: videoflow/multiview-fuser
  version: "1.0.0"
  license: MIT
  description: Fuses 2-5 time-synchronized per-camera feature streams into a 3D world-state stream via ground-plane association, global-id tracking, and DLT triangulation of player skeletons and the ball. Single task (event-time join).
spec:
  role: processor
  protocol: 1
  runtime:
    pythonClass: videoflow_contrib.multiview_fuser.MultiviewFuser
    images:
      cpu: ghcr.io/videoflow/contrib-multiview-fuser:1.0.0
  device: [cpu]
  params:
    schema:
      type: object
      additionalProperties: false
      required: [cameras]
      properties:
        cameras: {type: array, items: {type: string}, description: Ordered camera (parent) names, matching wiring order.}
        calibration: {type: ["object", "null"], default: null, description: "Inline {cam: calib} dict."}
        calibration_path: {type: ["string", "null"], default: null, description: Directory of per-camera calib JSONs, or a single JSON.}
        ref_fps: {type: number, default: 30.0, minimum: 1}
        assoc_gate_m: {type: number, default: 1.2, minimum: 0}
        min_views: {type: integer, default: 2, minimum: 2}
        kpt_min_conf: {type: number, default: 0.3, minimum: 0, maximum: 1}
        team_vote_window: {type: integer, default: 90, minimum: 1}
        ball_gap_bridge_s: {type: number, default: 0.3, minimum: 0}
  io:
    # 2-5 camera feature streams (packed per-camera dicts). Wiring is by parent name
    # (the `cameras` param); these entries are representative.
    inputs:
      - {name: cam0, type: videoflow.v1.Value}
      - {name: cam1, type: videoflow.v1.Value}
      - {name: cam2, type: videoflow.v1.Value}
      - {name: cam3, type: videoflow.v1.Value}
      - {name: cam4, type: videoflow.v1.Value}
    output: {type: videoflow.v1.Value}   # world-state dict
  constraints: {singleton: true}
