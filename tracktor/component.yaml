apiVersion: videoflow.io/v1
kind: Component
metadata:
  name: videoflow/tracktor
  version: "1.0.0"
  license: MIT
  description: Tracktor++ multi-object tracker (PyTorch, Faster-RCNN regression head). Stateful across frames, single task.
spec:
  role: processor
  protocol: 1
  runtime:
    pythonClass: videoflow_contrib.tracktor.TracktorFromFrames
    images:
      cpu: ghcr.io/videoflow/contrib-tracktor:1.0.0
      gpu: ghcr.io/videoflow/contrib-tracktor:1.0.0-cuda
  device: [cpu, gpu]
  params:
    schema:
      type: object
      additionalProperties: false
      properties:
        interpolate: {type: boolean, default: false}
  io:
    inputs:
      - {name: frame, type: videoflow.v1.Tensor}
    output: {type: videoflow.v1.Tensor}
  constraints: {singleton: true}
