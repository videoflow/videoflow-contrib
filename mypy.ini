[mypy]
# videoflow-contrib is a set of independent namespace sub-packages with heavy,
# untyped third-party deps (tensorflow, torch, cv2, videoflow). Mirror the core
# repo's lenient posture: validate annotated signatures, treat missing stubs as
# Any, and don't dive into untyped function bodies.
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_ignores = false
implicit_optional = true
no_implicit_optional = false
check_untyped_defs = false
# process()/consume() arity varies by parent count, so subclasses deliberately
# don't match the base signature (a positional-args-by-parent contract).
disable_error_code = override
namespace_packages = true
explicit_package_bases = true
# Vendored/illustrative code kept close to upstream, not type-checked.
exclude = (/examples/|/yolo3/)
